# Demo workload for the metrics e2e suite. This is a deliberate, self-contained
# copy of examples/demo/sample-app.yaml so the e2e fixture is insulated from
# edits to the example — DO NOT replace it with a symlink/reference.
#
# Two differences from the example matter for telemetry to actually flow:
#   - The image is the glibc node:20-slim, NOT node:20-alpine. The injector
#     auto-instruments via LD_PRELOAD of a glibc libotelinject.so; a musl
#     (alpine) image silently ignores the preload and emits no SDK metrics.
#   - OTEL_METRIC_EXPORT_INTERVAL is shortened so the assertion does not wait a
#     full default (60s) collection cycle.
#
# It lives in the `demo` namespace, which Beyla's `injector.instrument` criteria
# select; the controller then instruments its pods via the per-node ConfigMap
# Beyla writes. A Service fronts it so the load generator can drive HTTP traffic
# (the SDK only emits http.server.* metrics once the server handles requests).
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-node
  namespace: demo
  labels:
    app: hello-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-node
  template:
    metadata:
      labels:
        app: hello-node
    spec:
      containers:
        - name: hello
          image: node:20-slim
          env:
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "5000"
          command:
            - node
            - -e
            - |
              const http = require('http');
              const server = http.createServer((req, res) => {
                res.writeHead(200, { 'Content-Type': 'text/plain' });
                res.end('hello from node\n');
              });
              server.listen(8080, () => console.log('listening on 8080'));
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-node
  namespace: demo
spec:
  selector:
    app: hello-node
  ports:
    - port: 8080
      targetPort: 8080
