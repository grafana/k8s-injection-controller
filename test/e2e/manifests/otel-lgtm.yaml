# The injected SDK in the demo app exports OTLP to this instance's collector
# (ports 4317/4318); the suite then queries the bundled Prometheus (9090) with
# PromQL to assert the demo app's HTTP metrics arrived. The Service is NodePort
# so the test process on the host can reach Prometheus via the kind
# extraPortMapping (30090). No persistent storage — the instance is disposable.
---
apiVersion: v1
kind: Namespace
metadata:
  name: e2e-lgtm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  namespace: e2e-lgtm
  labels:
    app: lgtm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      containers:
        - name: lgtm
          image: grafana/otel-lgtm:0.28.0
          ports:
            - containerPort: 4317  # OTLP gRPC
            - containerPort: 4318  # OTLP HTTP
            - containerPort: 9090  # Prometheus / Mimir (PromQL queries)
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 60
---
apiVersion: v1
kind: Service
metadata:
  name: lgtm
  namespace: e2e-lgtm
spec:
  type: NodePort
  selector:
    app: lgtm
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prometheus
      port: 9090
      targetPort: 9090
      # Must match the extraPortMapping in test/e2e/kind-config.yaml and
      # lgtmPromNodePort in the suite so the host can query PromQL directly.
      nodePort: 30090
