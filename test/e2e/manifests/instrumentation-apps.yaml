# Sample apps and their load generator for the language SDK happy-path e2e
# tests. Each app is a minimal HTTP server using a framework that the OTel
# auto-instrumentation supports, deployed into the sdk-test namespace that Beyla
# is configured to watch. The injected SDK emits HTTP server spans to otel-lgtm;
# the tests assert those spans arrive in Tempo.
#
# imagePullPolicy: Never — all images are built locally and loaded into Kind by
# the suite's BeforeSuite; they are never present in a registry.
---
apiVersion: v1
kind: Namespace
metadata:
  name: sdk-test
---
# ---- Node.js (Express) ----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdk-nodejs
  namespace: sdk-test
  labels:
    app: sdk-nodejs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sdk-nodejs
  template:
    metadata:
      labels:
        app: sdk-nodejs
    spec:
      containers:
        - name: app
          image: sdk-nodejs-app:dev
          imagePullPolicy: Never
          env:
            # Short export interval so metrics show up within the test timeout
            # (SDK default is 60s).
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "1000"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: sdk-nodejs
  namespace: sdk-test
spec:
  selector:
    app: sdk-nodejs
  ports:
    - port: 8080
      targetPort: 8080
---
