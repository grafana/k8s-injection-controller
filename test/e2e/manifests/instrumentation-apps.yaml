---
# ---- Load generator (single pod, drives traffic to all apps) ----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdk-load
  namespace: sdk-test
  labels:
    app: sdk-load
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sdk-load
  template:
    metadata:
      labels:
        app: sdk-load
    spec:
      containers:
        - name: load
          image: curlimages/curl:8.11.0
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                curl -s -o /dev/null http://sdk-nodejs:8080/ || true
                curl -s -o /dev/null http://sdk-python:8080/ || true
                curl -s -o /dev/null http://sdk-python-musl:8080/ || true
                curl -s -o /dev/null http://sdk-java:8080/ || true
                curl -s -o /dev/null http://sdk-dotnet:8080/ || true
                curl -s -o /dev/null http://sdk-dotnet-musl:8080/ || true
                sleep 1
              done
