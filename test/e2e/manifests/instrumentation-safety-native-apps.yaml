# Resilience test apps deployed AFTER Beyla's per-node injection ConfigMap is
# active. Because Beyla's eBPF scanner may not recognise native binaries
# (GraalVM, .NET AOT) or ESM Node.js apps as instrumentable processes, they
# may never appear in eligible_for_restart. Deploying them here — after the
# controller's registry is populated — ensures new pods are instrumented
# directly by the webhook on admission without relying on a controller rollout.
#
# All images are built locally and loaded into Kind (imagePullPolicy: Never).
---
# ---- Java GraalVM native image ----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safety-java-graalvm
  namespace: safety-test
  labels:
    app: safety-java-graalvm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: safety-java-graalvm
  template:
    metadata:
      labels:
        app: safety-java-graalvm
    spec:
      containers:
        - name: app
          image: safety-java-graalvm-app:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: safety-java-graalvm
  namespace: safety-test
spec:
  selector:
    app: safety-java-graalvm
  ports:
    - port: 8080
      targetPort: 8080
---
