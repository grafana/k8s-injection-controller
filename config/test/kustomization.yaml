# Test overlay: production deploy + a sample SDK config and the manager patch
# that mounts it. `make deploy-test` applies this and then applies the
# example selector ConfigMap from examples/test_config_map.yaml separately
# (it lives in the user-workload namespace, not the controller namespace).

namespace: beyla-k8s-injector

resources:
  - ../default

# The ConfigMap is regenerated on every `make deploy-test`; the suffix hash
# changes whenever sdk-inject.yaml does, which kustomize threads through into
# the volume reference, triggering a rollout of the manager pod.
configMapGenerator:
  - name: beyla-sdk-config
    files:
      - sdk-inject.yaml

patches:
  # Strategic merge: mount the generated beyla-sdk-config ConfigMap. Merges into
  # the volumes/volumeMounts lists (by name) without disturbing other entries.
  - path: manager_sdk_config_patch.yaml
    target:
      kind: Deployment
      name: controller-manager
  # JSON 6902: append the --config flag. Done as an append (not as part of the
  # strategic-merge patch above) so it does not replace the args list that the
  # ../default overlay builds — replacing it drops --metrics-bind-address and
  # silently disables the metrics server.
  - path: manager_sdk_config_args_patch.yaml
    target:
      kind: Deployment
      name: controller-manager
