# Test overlay: the cert-manager production assembly + a sample SDK config and
# the manager patch that mounts it. `make deploy-test` applies this and then
# applies the example selector ConfigMap from examples/test_config_map.yaml
# separately (it lives in the user-workload namespace, not the controller
# namespace). Uses the cert-manager cert strategy (watch ns == install ns here,
# so the default config/webhook namespaceSelector is correct as-is).

resources:
  # cert-manager cert strategy; namespace + namePrefix come from here.
  - ../cert-manager

# The ConfigMap is regenerated on every `make deploy-test`; the suffix hash
# changes whenever sdk-inject.yaml does, which kustomize threads through into
# the volume reference, triggering a rollout of the manager pod.
configMapGenerator:
  - name: beyla-sdk-config
    # Namespace the generated ConfigMap explicitly (../cert-manager's namespace
    # transformer is one layer down and doesn't reach overlay-level generators).
    # Co-namespacing it with the Deployment is also what lets kustomize rewrite
    # the hashed name into the manager's volume reference.
    namespace: beyla-k8s-injector
    files:
      - sdk-inject.yaml

patches:
  - path: manager_sdk_config_patch.yaml
    target:
      kind: Deployment
      name: controller-manager
