# Sample config.SDKInject loaded by `make deploy-test`. Tweak to match your
# cluster — the values here are just placeholders that exercise every field.

# The OTLP endpoint / protocol no longer live here — they're per-ConfigMap,
# under `otel_export:` inside each selector's instrumentation.yaml.

debug: false

# OCI image carrying the SDK auto-instrumentation payload.
image_volume_root: ghcr.io/grafana/beyla/inject-sdk-image
image_version: 0.0.11

# How the SDK payload is delivered into instrumented pods:
#   image          - mount the image directly via ImageVolumeSource (k8s 1.31+)
#   init_container - provisions a 250Mi ephemeral volume and adds an init
#                    container that copies the payload into it (k8s < 1.31)
#   auto           - picks "image" on k8s 1.31+, "init_container" otherwise,
#                    checked once against the cluster's server version at boot
# Defaults to "auto" when unset.
injection_mode: auto

propagators:
  - tracecontext
  - baggage

export:
  traces: true
  metrics: true
  logs: false

resources:
  resourceAttributes:
    deployment.environment: dev
  addK8sUIDAttributes: true
  addK8sIPAttribute: false
  useLabelsForResourceAttributes: false

# Languages whose auto-instrumentation should run. Anything omitted gets the
# corresponding *_AUTO_INSTRUMENTATION_AGENT_PATH env var blanked, which the
# injector reads as "disabled".
enabled_sdks:
  - nodejs
  - python
  - java
  - dotnet
