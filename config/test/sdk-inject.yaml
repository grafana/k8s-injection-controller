# Sample config.SDKInject loaded by `make deploy-test`. Tweak to match your
# cluster — the values here are just placeholders that exercise every field.

# The OTLP endpoint / protocol no longer live here — they're per-ConfigMap,
# under `otel_export:` inside each selector's instrumentation.yaml.

debug: false

# OCI image mounted into pods via Kubernetes ImageVolumeSource. Requires k8s 1.31+.
image_volume_path: ghcr.io/grafana/beyla/inject-sdk-image:0.0.9

propagators:
  - tracecontext
  - baggage

export:
  traces: true
  metrics: true
  logs: false

resources:
  resourceAttributes:
    deployment.environment: dev
  addK8sUIDAttributes: true
  addK8sIPAttribute: false
  useLabelsForResourceAttributes: false

# Languages whose auto-instrumentation should run. Anything omitted gets the
# corresponding *_AUTO_INSTRUMENTATION_AGENT_PATH env var blanked, which the
# injector reads as "disabled".
enabled_sdks:
  - nodejs
  - python
  - java
  - dotnet
