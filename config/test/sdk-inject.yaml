# Sample config.SDKInject loaded by `make deploy-test`. Tweak to match your
# cluster — the values here are just placeholders that exercise every field.

otel_endpoint: http://otel-collector.observability.svc.cluster.local:4318
otel_protocol: http/protobuf
debug: false

# Volume strategy — pick ONE.
# (a) image_volume_path uses Kubernetes ImageVolumeSource (k8s 1.31+):
# image_volume_path: ghcr.io/grafana/beyla-otel-sdks:v0.1.0
#
# (b) host_path_volume requires a DaemonSet to populate the per-node directory.
host_path_volume: /var/lib/beyla-sdk
sdk_package_version: v0.1.0
host_mount_path: /var/lib/beyla-sdk
manage_sdk_versions: true

propagators:
  - tracecontext
  - baggage

export:
  traces: true
  metrics: true
  logs: false

resources:
  resourceAttributes:
    deployment.environment: dev
  addK8sUIDAttributes: true
  addK8sIPAttribute: false
  useLabelsForResourceAttributes: false

# Languages whose auto-instrumentation should run. Anything omitted gets the
# corresponding *_AUTO_INSTRUMENTATION_AGENT_PATH env var blanked, which the
# injector reads as "disabled".
enabled_sdks:
  - nodejs
  - python
  - java
  - dotnet
