# Mounts the generated beyla-sdk-config ConfigMap into the manager pod and
# adds the --config flag. Strategic merge patch: the args list is replaced
# wholesale, so the existing flags are repeated here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
spec:
  template:
    spec:
      containers:
        - name: manager
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --config=/etc/beyla-injector/sdk-inject.yaml
          volumeMounts:
            - name: sdk-config
              mountPath: /etc/beyla-injector
              readOnly: true
      volumes:
        - name: sdk-config
          configMap:
            name: beyla-sdk-config
