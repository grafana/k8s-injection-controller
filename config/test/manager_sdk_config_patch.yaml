# Mounts the generated beyla-sdk-config ConfigMap into the manager pod. The
# --config flag that points at the mounted file is added separately by
# manager_sdk_config_args_patch.yaml (a JSON 6902 append), so this strategic
# merge does not need — and must not include — an `args:` list (a strategic
# merge would replace args wholesale and drop the metrics/webhook flags the
# ../default overlay adds).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
spec:
  template:
    spec:
      containers:
        - name: manager
          volumeMounts:
            - name: sdk-config
              mountPath: /etc/beyla-injector
              readOnly: true
      volumes:
        - name: sdk-config
          configMap:
            name: beyla-sdk-config
