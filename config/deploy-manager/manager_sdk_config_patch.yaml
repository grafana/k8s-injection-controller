# Mounts the generated beyla-sdk-config ConfigMap into the manager pod and adds
# the --config flag. Unlike config/test's strategic-merge patch, these are
# JSON-6902 appends, so they layer cleanly on top of the args, volumeMounts and
# volumes that config/default already set (e.g. --webhook-cert-path) instead of
# replacing those lists wholesale.

# Point the manager at the mounted config file.
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --config=/etc/beyla-injector/sdk-inject.yaml

# Mount the generated ConfigMap.
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    name: sdk-config
    mountPath: /etc/beyla-injector
    readOnly: true

- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: sdk-config
    configMap:
      name: beyla-sdk-config

# Default the ConfigMap watch namespace to "monitoring" as per the default helm chart deployment mode.
# Without this the controller falls back to POD_NAMESPACE (its own namespace);
# set it explicitly here so the shipped manifest watches "monitoring" by default.
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: WATCH_NAMESPACE
    value: monitoring
