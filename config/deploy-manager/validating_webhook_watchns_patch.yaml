# Deploy-overlay override: scope the ConfigMap validating webhook to the
# namespace the controller actually watches (WATCH_NAMESPACE=monitoring, set in
# manager_sdk_config_patch.yaml), NOT the install namespace.
#
# config/webhook/configmap_namespace_selector_patch.yaml hardcodes the install
# namespace (beyla-k8s-injector), which is correct for config/test (watch ns ==
# install ns) but wrong here: this overlay watches "monitoring". Without this
# override the webhook (failurePolicy: Fail) both fails to guard Beyla's real
# injection ConfigMaps in "monitoring" AND intercepts the controller's own
# mounted SDK ConfigMap in "beyla-k8s-injector", deadlocking (re)apply when the
# webhook backend isn't yet reachable.
#
# Applied after ../cert-manager (which pulls in config/webhook's patch), so it
# overrides the matchLabels value. Keep this in sync with WATCH_NAMESPACE.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
  - name: vconfigmap-v1.beyla.grafana.com
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: monitoring
