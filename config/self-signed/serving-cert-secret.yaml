# Persistence layer for the controller-managed webhook serving certificate. The
# in-process cert rotator (--enable-cert-rotation) populates ca.crt/ca.key/tls.crt/
# tls.key here; it updates this Secret but never creates it, so we pre-create it
# empty. namePrefix turns the name into beyla-k8s-injector-webhook-server-cert,
# which is what the --webhook-cert-secret flag references and what ../default's
# webhook-certs volume mounts.
apiVersion: v1
kind: Secret
metadata:
  name: webhook-server-cert
  labels:
    app.kubernetes.io/name: k8s-injection-controller
    app.kubernetes.io/managed-by: kustomize
type: Opaque
