# Cert-strategy-agnostic base for the controller deployment. It assembles the
# manager, RBAC, webhook configs and metrics service, mounts the serving-cert
# Secret (manager_webhook_patch.yaml) and serves metrics over HTTPS
# (manager_metrics_patch.yaml) - but it does NOT pick how that serving cert is
# produced. Build a configuration ON TOP that adds a cert strategy:
#
#   config/cert-manager  = ../default + cert-manager Issuer/Certificate + CA injection
#   config/self-signed   = ../default + the controller's in-process cert rotator
#
# Both of those layers own the namespace + namePrefix transformers; this base
# intentionally does not, so a chosen cert strategy's resources (which live in
# the same layer as the transformers) get prefixed consistently. config/default
# is therefore not meant to be applied directly - use config/cert-manager or
# config/self-signed (or config/test / config/deploy, which build on them).

resources:
#- ../crd
- ../rbac
- ../manager
# [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix including the one in
# crd/kustomization.yaml
- ../webhook
# [PROMETHEUS] To enable prometheus monitor, uncomment all sections with 'PROMETHEUS'.
#- ../prometheus
# [METRICS] Expose the controller manager metrics service.
- metrics_service.yaml
# [NETWORK POLICY] Protect the /metrics endpoint and Webhook Server with NetworkPolicy.
# Only Pod(s) running a namespace labeled with 'metrics: enabled' will be able to gather the metrics.
# Only CR(s) which requires webhooks and are applied on namespaces labeled with 'webhooks: enabled' will
# be able to communicate with the Webhook Server.
#- ../network-policy

patches:
# [METRICS] The following patch will enable the metrics endpoint using HTTPS and the port :8443.
# More info: https://book.kubebuilder.io/reference/metrics
- path: manager_metrics_patch.yaml
  target:
    kind: Deployment

# [WEBHOOK] Mount the serving-cert Secret + add --webhook-cert-path and the
# webhook server port. Agnostic to who populates the Secret (cert-manager or the
# in-process rotator).
- path: manager_webhook_patch.yaml
  target:
    kind: Deployment
