# Scopes the ConfigMap validating webhook to the single namespace the
# controller watches (where Beyla writes its state ConfigMaps). This is what
# makes failurePolicy: Fail safe: an outage of the validator can only block
# ConfigMap writes in this one namespace, never cluster-wide.
#
# The annotation that actually marks a ConfigMap as injection config cannot be
# used as an admission selector (annotations are not selectable), so the
# webhook fires for every ConfigMap in this namespace and the handler inspects
# the annotation in-code.
#
# NOTE: the namespace name below must match the install namespace (the
# `namespace:` value in config/default/kustomization.yaml) and the controller's
# WATCH_NAMESPACE. Update all three together if you relocate the controller.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
  - name: vconfigmap-v1.beyla.grafana.com
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: beyla-k8s-injector
    # Exclude the cluster-managed kube-root-ca.crt ConfigMap so failurePolicy:
    # Fail never blocks the kube-controller-manager from publishing it into the
    # watched namespace — which would deadlock a fresh install when that
    # namespace is also the controller's own (the pod can't start without
    # kube-root-ca.crt). CEL matchConditions are GA in k8s 1.30 (beta, on by
    # default, in 1.28/1.29). On clusters < 1.28 use the Helm chart (which
    # enforces a separate watchNamespace) or ensure watchNamespace differs from
    # the controller namespace.
    matchConditions:
      - name: exclude-kube-root-ca
        expression: "object.metadata.name != 'kube-root-ca.crt'"
