# Excludes the controller's own namespace from the mutating webhook so that
# if the injector pod is recreated while the webhook backend is failing, it
# can still come up. We match by the well-known "kubernetes.io/metadata.name"
# label, which the kubelet/kube-apiserver auto-applies to every namespace.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
  - name: mpod-v1.beyla.grafana.com
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            # Kubernetes built-in system namespaces.
            - kube-system
            - kube-public
            - kube-node-lease
            # Common infrastructure namespaces.
            - cert-manager
            - monitoring
            - local-path-storage
            - grafana-alloy
            # GKE-managed namespaces.
            - gke-connect
            - gke-gmp-system
            - gke-managed-cim
            - gke-managed-filestorecsi
            - gke-managed-metrics-server
            - gke-managed-system
            - gke-system
            - gke-managed-volumepopulator
            # AKS-managed namespaces.
            - gatekeeper-system
            # The controller's own namespace — deadlock prevention.
            - beyla-k8s-injector
