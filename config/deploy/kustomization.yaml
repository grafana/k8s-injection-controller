# Artifact overlay built by `make yaml`: the production deploy (config/default)
# plus a default, mounted SDK config so the controller starts with a valid
# config out of the box. Unlike config/test, this overlay does not downgrade
# metrics security or change ports — it's meant to be a publishable manifest.

# No top-level namespace transformer here: config/default already namespaces its
# own resources to beyla-k8s-injector, and the cross-namespace RBAC in
# monitoring-rbac.yaml must keep its "monitoring" namespace (a transformer would
# rewrite it). The generated ConfigMap gets its namespace from the generator
# below instead.
resources:
  # Self-signed cert strategy (no cert-manager prerequisite); namespace +
  # namePrefix come from here.
  - ../self-signed
  # Grants the controller's ServiceAccount get/list/watch on ConfigMaps in the
  # watched namespace (monitoring), required because WATCH_NAMESPACE differs from
  # the controller's own namespace. See the file header for details.
  - monitoring-rbac.yaml

# The ConfigMap is regenerated on every build; the suffix hash changes whenever
# sdk-inject.yaml does, which kustomize threads through into the volume
# reference, triggering a rollout of the manager pod.
configMapGenerator:
  - name: beyla-sdk-config
    namespace: beyla-k8s-injector
    files:
      - sdk-inject.yaml

patches:
  - path: manager_sdk_config_patch.yaml
    target:
      kind: Deployment
      name: controller-manager
  - path: manager_allowed_writers_patch.yaml
    target:
      kind: Deployment
      name: controller-manager
  # Scope the ConfigMap validating webhook to WATCH_NAMESPACE (monitoring), not
  # the install namespace. config/webhook's default selector targets the install
  # namespace, which is only correct when watch ns == install ns (config/test).
  # See the patch header.
  - path: validating_webhook_watchns_patch.yaml
    target:
      kind: ValidatingWebhookConfiguration
      name: validating-webhook-configuration
  # This overlay watches a separate namespace, so the kube-root-ca self-deadlock
  # can't occur; drop the matchConditions exclusion that config/webhook adds for
  # the co-located overlays so this manifest also applies on Kubernetes < 1.28.
  - path: validating_webhook_no_matchconditions_patch.yaml
    target:
      kind: ValidatingWebhookConfiguration
      name: validating-webhook-configuration
