# Mounts the generated beyla-sdk-config ConfigMap into the manager pod and adds
# the --config flag. Unlike config/test's strategic-merge patch, these are
# JSON-6902 appends, so they layer cleanly on top of the args, volumeMounts and
# volumes that config/default already set (e.g. --webhook-cert-path) instead of
# replacing those lists wholesale.

# Point the manager at the mounted config file.
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --config=/etc/beyla-injector/sdk-inject.yaml

# Mount the generated ConfigMap.
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    name: sdk-config
    mountPath: /etc/beyla-injector
    readOnly: true

- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: sdk-config
    configMap:
      name: beyla-sdk-config
