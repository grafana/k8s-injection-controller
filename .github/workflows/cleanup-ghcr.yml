name: Cleanup GHCR images

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch: {}

permissions: {}

jobs:
  cleanup:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Remove GHCR short-SHA image versions older than 15 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: grafana
          PACKAGE: k8s-injection-controller
          KEEP_DAYS: "15"
        run: |
          cutoff="$(date -u -d "${KEEP_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)"
          gh api "orgs/${OWNER}/packages/container/${PACKAGE}/versions?per_page=100" --paginate --jq '
            .[]
            | select(.created_at < "'"${cutoff}"'")
            | select((.metadata.container.tags // []) | index("main") | not)
            | select((.metadata.container.tags // []) | any(test("^[0-9a-f]{7}$")))
            | .id
          ' | while read -r version_id; do
            [ -n "$version_id" ] || continue
            gh api --method DELETE "orgs/${OWNER}/packages/container/${PACKAGE}/versions/${version_id}"
          done
