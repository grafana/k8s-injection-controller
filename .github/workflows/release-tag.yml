name: release-tag

run-name: Release ${{ github.ref_name }}

# On a semver tag push, build and publish the multi-arch image to GHCR and the
# GAR mirror (tagged :X.Y.Z / :X.Y / :X / :latest), then record a GitHub Release.
# Delegates the image build/publish to the shared release-base pipeline.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # stable, e.g. v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*" # pre-release, e.g. v1.2.3-rc.1

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  images:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/release-base.yml
    with:
      version: ${{ github.ref_name }}
      push-gar: true

  # Record the release on GitHub with auto-generated notes (no assets — the
  # artifacts are the published container images). Runs after the images are
  # published so the release only appears once they exist.
  github-release:
    name: Create GitHub Release
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release
    steps:
      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Pre-release tags carry a hyphenated suffix (e.g. v1.2.3-rc.1).
          prerelease=""
          [[ "$TAG" == *-* ]] && prerelease="--prerelease"
          # Idempotent: skip if the release already exists (e.g. on a re-run).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes $prerelease
          fi
