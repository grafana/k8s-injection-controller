# Default values for k8s-injection-controller.
# This is a YAML-formatted file.

# -- Namespace where the controller and all its namespaced resources are
# installed. When `namespace.create` is true the chart renders the Namespace
# object itself; set it to false (and pass `helm install --namespace <ns>`) if
# you prefer Helm / `--create-namespace` to own the namespace.
namespace:
  name: beyla-k8s-injector
  create: true

# -- Namespace whose ConfigMaps the controller watches for Beyla-managed
# injection config. Leave empty to watch the controller's own namespace
# (`namespace.name`); set it to the namespace where Beyla writes its state
# ConfigMaps (e.g. "monitoring") when the two are not co-located. When it
# differs from `namespace.name` the chart also renders a Role + RoleBinding in
# that namespace granting the controller get/list/watch on ConfigMaps.
watchNamespace: ""

replicaCount: 1

image:
  repository: ghcr.io/grafana/beyla-k8s-injector
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# -- Comma-separated allowlist of usernames permitted to create/update the
# annotated injection ConfigMaps — typically Beyla's ServiceAccount. Members of
# system:masters are always allowed (break-glass).
allowedConfigMapWriters: "system:serviceaccount:beyla-k8s-injector:beyla"

# -- Run the controller with leader election enabled.
leaderElection: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - "ALL"

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

# -- SDK auto-instrumentation defaults mounted into the controller (the
# `config.SDKInject` document passed via --config). When disabled the
# controller still selects matching workloads but performs no mutation.
sdkConfig:
  enabled: true
  debug: false
  # OCI image carrying the SDK auto-instrumentation payload.
  imageVolumeRoot: ghcr.io/grafana/beyla/inject-sdk-image
  imageVersion: 0.0.13
  # How the SDK payload is delivered into instrumented pods:
  #   image          - mount the OCI image via ImageVolumeSource (k8s 1.31+)
  #   init_container - copy the payload via an init container (k8s < 1.31)
  #   auto           - "image" on k8s 1.31+, "init_container" otherwise
  injectionMode: auto
  propagators:
    - tracecontext
    - baggage
  export:
    traces: true
    metrics: true
    logs: false
  # Languages whose auto-instrumentation should run.
  enabledSDKs:
    - nodejs
    - python
    - java
    - dotnet

# -- Pod mutating webhook configuration.
webhook:
  # Namespaces excluded from the mutating webhook via namespaceSelector. The
  # install namespace is always appended automatically (deadlock prevention).
  excludedNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease
    - cert-manager
    - monitoring
    - local-path-storage
    - grafana-alloy
    # GKE-managed namespaces.
    - gke-connect
    - gke-gmp-system
    - gke-managed-cim
    - gke-managed-filestorecsi
    - gke-managed-metrics-server
    - gke-managed-system
    - gke-system
    - gke-managed-volumepopulator
    # AKS-managed namespaces.
    - gatekeeper-system

# -- Controller metrics endpoint (HTTPS on :8443, protected by authn/authz).
metrics:
  enabled: true
  secure: true
  # Protect the metrics server with a cert-manager-issued certificate.
  # Requires a working cert-manager in the cluster.
  certManager: false
  # Render a Prometheus Operator ServiceMonitor for the metrics endpoint.
  serviceMonitor:
    enabled: false

# -- NetworkPolicies restricting access to the webhook (:443) and metrics
# (:8443) ports to namespaces labeled `webhook: enabled` / `metrics: enabled`.
networkPolicy:
  enabled: false

# -- cert-manager subchart. The chart always renders a self-signed cert-manager
# Issuer + Certificate and wires CA injection into the webhook configurations,
# so cert-manager CRDs must be present in the cluster. Set `enabled: true` to
# have this chart install cert-manager (via its official subchart) for you;
# leave it false if cert-manager is already installed.
#
# Everything under this `cert-manager:` key is forwarded to the cert-manager
# subchart (https://artifacthub.io/packages/helm/cert-manager/cert-manager),
# except `enabled`, which only toggles whether the subchart is installed.
cert-manager:
  enabled: false
  # Install cert-manager's CRDs together with the subchart.
  crds:
    enabled: true
