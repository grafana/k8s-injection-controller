{{- $namespace := include "k8s-injection-controller.namespace" . -}}
{{- $watchNamespace := include "k8s-injection-controller.watchNamespace" . -}}
{{- $webhookService := include "k8s-injection-controller.webhookServiceName" . -}}
{{- $caInject := printf "%s/%s" $namespace (include "k8s-injection-controller.servingCertName" .) -}}
{{- /* Excluded namespaces = configured list plus the controller's own namespace (deadlock prevention), de-duplicated. */ -}}
{{- $excluded := concat .Values.webhook.excludedNamespaces (list $namespace) | uniq -}}
{{- /* Bootstrap-deadlock guard. On k8s < 1.28 the apiserver lacks admission
       matchConditions, so the ConfigMap validating webhook (failurePolicy: Fail)
       cannot carve out kube-root-ca.crt. If it is then scoped to the controller's
       own namespace it would block the kube-controller-manager from publishing
       kube-root-ca.crt there while this pod is still starting — a fresh-install
       deadlock. Refuse to install unless watchNamespace is a different namespace.
       (watchNamespace resolves to the controller namespace when empty.) */ -}}
{{- if not (semverCompare ">=1.28-0" .Capabilities.KubeVersion.Version) }}
{{- if eq $watchNamespace $namespace }}
{{- fail (printf "Kubernetes %s is older than 1.28 and lacks admission matchConditions; with watchNamespace empty or equal to the controller namespace (%s), the ConfigMap validating webhook (failurePolicy: Fail) would deadlock a fresh install. Set watchNamespace to a namespace other than %q, or upgrade to Kubernetes >= 1.28." .Capabilities.KubeVersion.Version $namespace $namespace) }}
{{- end }}
{{- end }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "k8s-injection-controller.fullname" . }}-mutating-webhook
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
  {{- if eq (include "k8s-injection-controller.certMode" .) "cert-manager" }}
  annotations:
    cert-manager.io/inject-ca-from: {{ $caInject }}
  {{- end }}
webhooks:
- name: mpod-v1.beyla.grafana.com
  admissionReviewVersions:
  - v1
  sideEffects: None
  # A broken injector must never block pod creation.
  failurePolicy: Ignore
  clientConfig:
    service:
      name: {{ $webhookService }}
      namespace: {{ $namespace }}
      path: /mutate--v1-pod
  namespaceSelector:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
        {{- range $excluded }}
        - {{ . }}
        {{- end }}
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "k8s-injection-controller.fullname" . }}-validating-webhook
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
  {{- if eq (include "k8s-injection-controller.certMode" .) "cert-manager" }}
  annotations:
    cert-manager.io/inject-ca-from: {{ $caInject }}
  {{- end }}
webhooks:
- name: vconfigmap-v1.beyla.grafana.com
  admissionReviewVersions:
  - v1
  sideEffects: None
  # Scoped to the single watched namespace, which is what makes failurePolicy
  # Fail safe: a validator outage can only block ConfigMap writes there.
  failurePolicy: Fail
  clientConfig:
    service:
      name: {{ $webhookService }}
      namespace: {{ $namespace }}
      path: /validate--v1-configmap
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: {{ $watchNamespace }}
  {{- if semverCompare ">=1.28-0" .Capabilities.KubeVersion.Version }}
  matchConditions:
  - name: exclude-kube-root-ca
    expression: "object.metadata.name != 'kube-root-ca.crt'"
  {{- end }}
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - configmaps
