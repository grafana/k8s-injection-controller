{{- $namespace := include "k8s-injection-controller.namespace" . -}}
{{- $watchNamespace := include "k8s-injection-controller.watchNamespace" . -}}
{{- $webhookService := include "k8s-injection-controller.webhookServiceName" . -}}
{{- $caInject := printf "%s/%s" $namespace (include "k8s-injection-controller.servingCertName" .) -}}
{{- /* Excluded namespaces = configured list plus the controller's own namespace (deadlock prevention), de-duplicated. */ -}}
{{- $excluded := concat .Values.webhook.excludedNamespaces (list $namespace) | uniq -}}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "k8s-injection-controller.fullname" . }}-mutating-webhook
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
  {{- if eq (include "k8s-injection-controller.certMode" .) "cert-manager" }}
  annotations:
    cert-manager.io/inject-ca-from: {{ $caInject }}
  {{- end }}
webhooks:
- name: mpod-v1.beyla.grafana.com
  admissionReviewVersions:
  - v1
  sideEffects: None
  # A broken injector must never block pod creation.
  failurePolicy: Ignore
  clientConfig:
    service:
      name: {{ $webhookService }}
      namespace: {{ $namespace }}
      path: /mutate--v1-pod
  namespaceSelector:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
        {{- range $excluded }}
        - {{ . }}
        {{- end }}
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "k8s-injection-controller.fullname" . }}-validating-webhook
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
  {{- if eq (include "k8s-injection-controller.certMode" .) "cert-manager" }}
  annotations:
    cert-manager.io/inject-ca-from: {{ $caInject }}
  {{- end }}
webhooks:
- name: vconfigmap-v1.beyla.grafana.com
  admissionReviewVersions:
  - v1
  sideEffects: None
  # SHIPS as Ignore; the controller hardens it to Fail at runtime (see
  # cmd/webhook_activation.go). Shipping Fail would deadlock a fresh install: the
  # webhook is scoped to the watched namespace (usually the controller's own), so
  # Fail would block the apiserver from publishing kube-root-ca.crt there while
  # the backend (this pod) is still starting — but the pod can't start without
  # that ConfigMap. Ignore fails open during bootstrap; once the controller is
  # serving it patches this to Fail (the steady-state security policy). The blast
  # radius stays bounded by the namespaceSelector below.
  failurePolicy: Ignore
  clientConfig:
    service:
      name: {{ $webhookService }}
      namespace: {{ $namespace }}
      path: /validate--v1-configmap
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: {{ $watchNamespace }}
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - configmaps
