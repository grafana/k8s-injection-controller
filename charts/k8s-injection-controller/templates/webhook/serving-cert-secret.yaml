{{- if eq (include "k8s-injection-controller.certMode" .) "self-signed" -}}
{{- $namespace := include "k8s-injection-controller.namespace" . -}}
# Persistence layer for the controller-managed webhook serving certificate. The
# in-process cert rotator (see --enable-cert-rotation) populates ca.crt/ca.key/tls.crt/
# tls.key here; it updates this Secret but never creates it, so the chart
# pre-creates it empty. Only rendered when cert-manager is not in use.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-injection-controller.servingCertName" . }}
  namespace: {{ $namespace }}
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
type: Opaque
{{- end }}
