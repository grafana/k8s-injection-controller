{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-injection-controller.fullname" . }}-metrics
  namespace: {{ include "k8s-injection-controller.namespace" . }}
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
spec:
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: 8443
  selector:
    {{- include "k8s-injection-controller.selectorLabels" . | nindent 4 }}
{{- end }}
