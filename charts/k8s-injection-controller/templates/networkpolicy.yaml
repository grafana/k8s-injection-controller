{{- if .Values.networkPolicy.enabled }}
{{- $namespace := include "k8s-injection-controller.namespace" . -}}
# Restricts ingress to the webhook server (:443) to namespaces labeled
# `webhook: enabled`.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "k8s-injection-controller.fullname" . }}-allow-webhook-traffic
  namespace: {{ $namespace }}
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "k8s-injection-controller.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              webhook: enabled
      ports:
        - port: 443
          protocol: TCP
{{- if .Values.metrics.enabled }}
---
# Restricts ingress to the metrics endpoint (:8443) to namespaces labeled
# `metrics: enabled`.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "k8s-injection-controller.fullname" . }}-allow-metrics-traffic
  namespace: {{ $namespace }}
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "k8s-injection-controller.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              metrics: enabled
      ports:
        - port: 8443
          protocol: TCP
{{- end }}
{{- end }}
