{{- $fullName := include "k8s-injection-controller.fullname" . -}}
{{- $namespace := include "k8s-injection-controller.namespace" . -}}
{{- $saName := include "k8s-injection-controller.serviceAccountName" . -}}
# Cluster-wide permissions: resolve pod owner chains, evict pods and trigger
# workload rollouts so matching pods get re-admitted and instrumented.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $fullName }}-manager-role
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - delete
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - statefulsets
  verbs:
  - patch
- apiGroups:
  - apps
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
{{- if eq (include "k8s-injection-controller.certMode" .) "self-signed" }}
# Self-managed webhook cert: the in-process rotator watches the webhook
# configurations and injects the caBundle. list/watch cannot be name-scoped;
# the mutating writes are scoped by resourceNames to this release's configs.
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - mutatingwebhookconfigurations
  - validatingwebhookconfigurations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - mutatingwebhookconfigurations
  - validatingwebhookconfigurations
  resourceNames:
  - {{ $fullName }}-mutating-webhook
  - {{ $fullName }}-validating-webhook
  verbs:
  - update
  - patch
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $fullName }}-manager-rolebinding
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $fullName }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ $saName }}
  namespace: {{ $namespace }}
{{- if eq (include "k8s-injection-controller.certMode" .) "self-signed" }}
---
# Self-managed webhook cert: the rotator persists the serving cert into a Secret
# in the controller's own namespace. list/watch cannot be name-scoped (the
# rotator's cache lists Secrets in this namespace); get/update are.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullName }}-cert-rotator-role
  namespace: {{ $namespace }}
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ include "k8s-injection-controller.servingCertName" . }}
  verbs:
  - get
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-cert-rotator-rolebinding
  namespace: {{ $namespace }}
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}-cert-rotator-role
subjects:
- kind: ServiceAccount
  name: {{ $saName }}
  namespace: {{ $namespace }}
{{- end }}
