{{- if .Values.leaderElection }}
{{- $fullName := include "k8s-injection-controller.fullname" . -}}
{{- $namespace := include "k8s-injection-controller.namespace" . -}}
{{- $saName := include "k8s-injection-controller.serviceAccountName" . -}}
# Permissions to perform leader election in the controller's own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullName }}-leader-election-role
  namespace: {{ $namespace }}
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-leader-election-rolebinding
  namespace: {{ $namespace }}
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ $saName }}
  namespace: {{ $namespace }}
{{- end }}
