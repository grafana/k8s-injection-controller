{{- if and .Values.metrics.enabled .Values.metrics.secure }}
{{- $fullName := include "k8s-injection-controller.fullname" . -}}
{{- $namespace := include "k8s-injection-controller.namespace" . -}}
{{- $saName := include "k8s-injection-controller.serviceAccountName" . -}}
# Allows the metrics endpoint to authenticate/authorize scrapers via the
# TokenReview / SubjectAccessReview APIs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $fullName }}-metrics-auth-role
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $fullName }}-metrics-auth-rolebinding
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $fullName }}-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: {{ $saName }}
  namespace: {{ $namespace }}
---
# Grants HTTP GET on /metrics. Bind this to whatever identity scrapes the
# controller (e.g. a Prometheus ServiceAccount).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $fullName }}-metrics-reader
  labels:
    {{- include "k8s-injection-controller.labels" . | nindent 4 }}
rules:
- nonResourceURLs:
  - "/metrics"
  verbs:
  - get
{{- end }}
