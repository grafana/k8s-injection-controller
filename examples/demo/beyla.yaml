# Beyla DaemonSet for the demo. Beyla runs with its mutating webhook delegated
# to the k8s-injection-controller: instead of mutating pods itself, Beyla scans
# local processes and writes a per-node ConfigMap that the controller consumes.
#
# The controller-manager Deployment that Beyla delegates to is identified by
# its <namespace>/<name>. `make deploy-test` places it at
# beyla-k8s-injector/controller-manager, which is the value we set in
# BEYLA_EXTERNAL_WEBHOOK_DEPLOYMENT_NAME below.
#
# Beyla runs in the same namespace as the controller (beyla-k8s-injector),
# which is created by `make deploy-test`; this file does not create it.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: beyla
  namespace: beyla-k8s-injector
---
# Cluster-wide read access on pods/replicasets so Beyla's kube informer can
# observe workloads across all nodes (it filters local processes itself).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: beyla-demo
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: beyla-demo
subjects:
  - kind: ServiceAccount
    name: beyla
    namespace: beyla-k8s-injector
roleRef:
  kind: ClusterRole
  name: beyla-demo
  apiGroup: rbac.authorization.k8s.io
---
# Namespaced ConfigMap permissions: the StateConfigMapWriter creates one
# ConfigMap per node in its own namespace, owned by the Beyla DaemonSet.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: beyla-demo
  namespace: beyla-k8s-injector
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: beyla-demo
  namespace: beyla-k8s-injector
subjects:
  - kind: ServiceAccount
    name: beyla
    namespace: beyla-k8s-injector
roleRef:
  kind: Role
  name: beyla-demo
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beyla-config
  namespace: beyla-k8s-injector
data:
  beyla-config.yaml: |
    log_level: info
    attributes:
      kubernetes:
        enable: true
    # OTLP traces export. The endpoint + protocol here are what end up under
    # `otel_export:` in the per-node ConfigMap that Beyla writes for the
    # injection controller — that's how the controller learns where to point
    # the SDKs it injects into matched pods. Override via the standard OTLP
    # env vars (OTEL_EXPORTER_OTLP_ENDPOINT, OTEL_EXPORTER_OTLP_PROTOCOL) if
    # you don't run the collector at this address.
    otel_traces_export:
      endpoint: http://otel-collector.observability.svc.cluster.local:4318
      protocol: http/protobuf
    injector:
      # Workloads matched by these criteria are recorded in the per-node
      # ConfigMap as eligible_for_restart and sent to the external controller.
      instrument:
        - k8s_namespace: demo
      # Delegate mutation to the external controller-manager Deployment.
      # When this is set Beyla skips its own TLS webhook server and only
      # publishes the per-node ConfigMap.
      webhook:
        external_deployment_name: beyla-k8s-injector/beyla-k8s-injector-controller-manager
      sdk_package_version: v0.0.9
      # The actual SDK volume / image is configured on the controller side
      # (config/test/sdk-inject.yaml). Beyla itself doesn't mount anything
      # into target pods in this mode.
      manage_sdk_versions: false
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beyla
  namespace: beyla-k8s-injector
  labels:
    app.kubernetes.io/name: beyla
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: beyla
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beyla
    spec:
      serviceAccountName: beyla
      hostPID: true
      containers:
        - name: beyla
          image: grafana/beyla:main
          imagePullPolicy: IfNotPresent
          args: ["--config=/etc/beyla/beyla-config.yaml"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: KUBE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            runAsUser: 0
            readOnlyRootFilesystem: true
            privileged: true
          volumeMounts:
            - name: config
              mountPath: /etc/beyla
              readOnly: true
            - name: var-run-beyla
              mountPath: /var/run/beyla
            - name: cgroup
              mountPath: /sys/fs/cgroup
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      volumes:
        - name: config
          configMap:
            name: beyla-config
        - name: var-run-beyla
          emptyDir: {}
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
