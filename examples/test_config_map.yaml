apiVersion: v1
kind: ConfigMap
metadata:
  name: beyla-selector-demo
  namespace: default
  annotations:
    beyla.grafana.com/node: "some-node"
data:
  instrumentation.yaml: |
    discovery:
      # AND within an entry, OR across entries.
      - k8s_namespace: demo
    otel_export:
      endpoint: http://otel-collector.observability.svc.cluster.local:4318
      protocol: http/protobuf
  eligible_for_restart.yaml: |
    # Restart all pods in namespace "demo" owned (transitively) by the
    # Deployment "hello" — name is optional; omit it to target every
    # Deployment in the namespace. language is parsed but currently unused.
    - namespace: demo
      kind: Deployment
      name: worker
      language: nodejs
